<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interface BTP Premium</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #05070d, #0b1220, #0d1b2a);
      color: #ffffff;
      min-height: 100vh;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    /* MENU GAUCHE */
    .sidebar {
      width: 290px;
      background: linear-gradient(180deg, #02050b, #08111f, #0a1930);
      padding: 25px 18px;
      border-right: 1px solid rgba(0, 102, 255, 0.25);
    }

    .sidebar h2 {
      text-align: center;
      color: #5aa9ff;
      margin-bottom: 25px;
    }

    .menu-btn {
      width: 100%;
      background: #0d1b2a;
      color: #ffffff;
      border: 1px solid rgba(90, 169, 255, 0.25);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      text-align: left;
      cursor: pointer;
      transition: 0.3s;
    }

    .menu-btn:hover {
      background: #1b4f8d;
    }

    /* CONTENU DROIT */
    .main-content {
      flex: 1;
      padding: 30px;
    }

    .panel {
      background: #0d1727;
      border-radius: 15px;
      padding: 25px;
    }

    .panel h1 {
      color: #5aa9ff;
      margin-bottom: 20px;
    }

    .select-box {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
      background: #08111f;
      color: white;
    }

    /* BOUTONS */
    .action-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .action-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #1b4f8d;
      color: white;
      cursor: pointer;
    }

    .action-btn:hover {
      background: #2a6fc2;
    }

    /* TABLEAU */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      border: 1px solid #1b4f8d;
      text-align: center;
    }

    th {
      background: #1b4f8d;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- MENU GAUCHE -->
  <aside class="sidebar">
    <h2>Commandes</h2>

    <button class="menu-btn">Terrassement et fondation</button>
    <button class="menu-btn">Béton et Maçonnerie</button>
    <button class="menu-btn">Carrelage et revêtement</button>
    <button class="menu-btn">Charpente et couverture</button>
    <button class="menu-btn">Plafond</button>
    <button class="menu-btn">Plomberie</button>
    <button class="menu-btn">Electricité</button>
    <button class="menu-btn">Menuiserie et Ferronnerie</button>
    <button class="menu-btn">Finition et Peinture</button>
  </aside>

  <!-- CONTENU DROIT -->
  <main class="main-content">
    <div class="panel">

      <h1>Tâche</h1>

      <select class="select-box">
        <option>Choisir une tâche</option>
        <option>Excavation</option>
        <option>Semelle filante</option>
        <option>Béton armé</option>
        <option>Montage de mur</option>
        <option>Pose carrelage</option>
        <option>Charpente</option>
        <option>Plafond</option>
        <option>Plomberie</option>
        <option>Electricité</option>
        <option>Menuiserie</option>
        <option>Peinture</option>
      </select>

      <div class="action-buttons">
        <button class="action-btn">Rendement du personnel</button>
        <button class="action-btn">Quantitatifs des matériaux</button>
        <button class="action-btn">Rendement matériels</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Rôle</th>
            <th>Rendement (h/U)</th>
            <th>Production (U/h)</th>
            <th>Efficacité</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Chef de chantier</td>
            <td>1.2</td>
            <td>0.83</td>
            <td>92%</td>
          </tr>
          <tr>
            <td>Maçon</td>
            <td>0.75</td>
            <td>1.33</td>
            <td>88%</td>
          </tr>
          <tr>
            <td>Manœuvre</td>
            <td>0.5</td>
            <td>2.0</td>
            <td>85%</td>
          </tr>
        </tbody>
      </table>

    </div>
  </main>

</div>

</body>
</html>
