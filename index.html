<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstraStruct - Ultra Pro</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(30, 80, 180, 0.20), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0, 140, 255, 0.14), transparent 30%),
        linear-gradient(135deg, #03050a, #07101d, #0b1628, #0a1322);
      color: #ffffff;
      min-height: 100vh;
    }

    .header {
      height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: rgba(4, 8, 16, 0.88);
      border-bottom: 1px solid rgba(91, 169, 255, 0.15);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #0d2342, #1b5fbf, #57b0ff);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    .brand-text h1 {
      font-size: 26px;
      color: #7fc4ff;
    }

    .container {
      display: flex;
    }

    .sidebar {
      width: 300px;
      padding: 20px;
      background: #07101d;
    }

    .menu-btn {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: none;
      background: #102948;
      color: white;
      cursor: pointer;
    }

    .menu-btn:hover {
      background: #1b5eb0;
    }

    .main-content {
      flex: 1;
      padding: 25px;
    }

    .panel {
      background: #0d1727;
      padding: 25px;
      border-radius: 15px;
    }

    h2 {
      margin-bottom: 20px;
      color: #7fc4ff;
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 20px;
      background: #08111f;
      color: white;
      border: none;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .action-btn {
      flex: 1;
      padding: 12px;
      background: #1b5eb0;
      border: none;
      border-radius: 10px;
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      border: 1px solid #1b5eb0;
      text-align: center;
    }

    th {
      background: #1b5eb0;
    }
  </style>
</head>

<body>

<header class="header">
  <div class="brand">
    <div class="logo-icon">A</div>
    <div class="brand-text">
      <h1>AstraStruct</h1>
    </div>
  </div>
</header>

<div class="container">

  <!-- MENU -->
  <aside class="sidebar">
    <button class="menu-btn" onclick="chargerTerrassement()">
      Terrassement et fondation
    </button>

    <button class="menu-btn">Béton et Maçonnerie</button>
    <button class="menu-btn">Carrelage et revêtement</button>
    <button class="menu-btn">Charpente et couverture</button>
    <button class="menu-btn">Plafond</button>
    <button class="menu-btn">Plomberie</button>
    <button class="menu-btn">Electricité</button>
    <button class="menu-btn">Menuiserie et Ferronnerie</button>
    <button class="menu-btn">Finition et Peinture</button>
  </aside>

  <!-- CONTENU -->
  <main class="main-content">
    <div class="panel">

      <h2>Tâche</h2>

      <select id="tache">
        <option>Choisir une tâche</option>
      </select>

      <div class="action-buttons">
        <button class="action-btn">Rendement du personnel</button>
        <button class="action-btn">Quantitatifs des matériaux</button>
        <button class="action-btn">Rendement matériels</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Rôle</th>
            <th>Rendement (h/U)</th>
            <th>Production (U/h)</th>
            <th>Efficacité</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Chef de chantier</td>
            <td>1.20</td>
            <td>0.83</td>
            <td>92%</td>
          </tr>
        </tbody>
      </table>

    </div>
  </main>

</div>

<!-- SCRIPT -->
<script>
function chargerTerrassement() {
  const select = document.getElementById("tache");

  select.innerHTML = `
    <option>Choisir une tâche</option>
    <option>Décapage et débroussaillage</option>
    <option>Réglage et nivellement</option>
    <option>Fouille pour fondation</option>
    <option>Remblai</option>
    <option>Déblai et évacuation des terres</option>
  `;
}
</script>

</body>
</html>
