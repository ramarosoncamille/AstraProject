<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstraStruct</title>
  <link rel="icon" type="image/png" href="logos.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(30, 80, 180, 0.20), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0, 140, 255, 0.14), transparent 30%),
        linear-gradient(135deg, #03050a, #07101d, #0b1628, #0a1322);
      color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    .header {
      min-height: 100px;
      height: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: rgba(4, 8, 16, 0.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(91, 169, 255, 0.15);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

.logo-icon {
  width: 90px;
  height: 90px;
  border-radius: 18px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  background: rgba(255,255,255,0.03);
  box-shadow:
    0 0 12px rgba(87, 176, 255, 0.20),
    0 0 28px rgba(27, 95, 191, 0.18);
}

.logo-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.scintille {
  animation: pulseGlow 2.2s infinite ease-in-out;
}

.scintille::after {
  content: "";
  position: absolute;
  top: -20%;
  left: -140%;
  width: 70%;
  height: 140%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.18),
    rgba(255,255,255,0.55),
    transparent
  );
  transform: rotate(18deg);
  animation: shineSweep 3s infinite;
}

    .brand-text h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #7fc4ff;
      text-shadow: 0 0 12px rgba(87, 176, 255, 0.22);
    }

    .brand-text p {
      font-size: 12px;
      color: #a9c9ef;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .top-badge {
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: #dcedff;
      background: linear-gradient(135deg, rgba(20,40,75,0.95), rgba(17,69,130,0.95));
      border: 1px solid rgba(113, 188, 255, 0.25);
      box-shadow: 0 0 18px rgba(50, 120, 255, 0.14);
    }
.menu-toggle {
  display: none;
  background: rgba(20,40,75,0.95);
  border: 1px solid rgba(113, 188, 255, 0.25);
  color: #ffffff;
  font-size: 26px;
  width: 48px;
  height: 48px;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 0 18px rgba(50, 120, 255, 0.14);
}
    /* LAYOUT */
    .container {
      display: flex;
      min-height: calc(100vh - 82px);
    }

    /* SIDEBAR */
    .sidebar {
      width: 320px;
      padding: 22px 18px;
      background: linear-gradient(180deg, rgba(2,5,11,0.97), rgba(7,16,29,0.95), rgba(10,24,45,0.96));
      border-right: 1px solid rgba(91, 169, 255, 0.12);
      box-shadow: 8px 0 25px rgba(0, 0, 0, 0.22);
    }

    .sidebar-title {
      font-size: 15px;
      color: #8fc9ff;
      font-weight: 700;
      margin-bottom: 18px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .menu-btn {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 12px;
      border-radius: 14px;
      border: 1px solid rgba(105, 175, 255, 0.16);
      background: linear-gradient(135deg, rgba(8,18,33,0.98), rgba(14,30,53,0.98));
      color: #eff7ff;
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: 0.28s ease;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18);
      position: relative;
      overflow: hidden;
    }

    .menu-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      transition: 0.5s;
    }

    .menu-btn:hover::before {
      left: 100%;
    }

    .menu-btn:hover {
      transform: translateX(5px) scale(1.01);
      background: linear-gradient(135deg, #102948, #164c87);
      border-color: rgba(122, 197, 255, 0.35);
      box-shadow: 0 0 20px rgba(56, 135, 255, 0.16);
    }

    .menu-btn.active {
      background: linear-gradient(135deg, #123159, #1c5eaa);
      border-color: rgba(122, 197, 255, 0.45);
      box-shadow:
        0 0 18px rgba(79, 156, 255, 0.18),
        inset 0 0 10px rgba(255,255,255,0.04);
    }

    /* MAIN */
    .main-content {
      flex: 1;
      padding: 28px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(8,16,30,0.95), rgba(10,20,37,0.96));
      border: 1px solid rgba(105, 175, 255, 0.14);
      border-radius: 24px;
      padding: 28px;
      box-shadow:
        0 14px 35px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .panel-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 24px;
    }

    .panel h2 {
      font-size: 32px;
      color: #7fc4ff;
      font-weight: 800;
      text-shadow: 0 0 12px rgba(127, 196, 255, 0.14);
    }

    .mini-info {
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(18, 43, 76, 0.7);
      border: 1px solid rgba(122, 197, 255, 0.18);
      color: #d9eeff;
      font-size: 13px;
    }

    .field-label {
      display: block;
      margin-bottom: 10px;
      color: #dbeeff;
      font-size: 16px;
      font-weight: 700;
    }

    .select-box {
      width: 100%;
      padding: 15px 16px;
      border-radius: 16px;
      border: 1px solid rgba(112, 186, 255, 0.18);
      background: linear-gradient(135deg, #08111f, #0d1930);
      color: #5aa9ff;
      font-size: 15px;
      margin-bottom: 24px;
      outline: none;
      transition: 0.25s;
      box-shadow: inset 0 0 12px rgba(255,255,255,0.02);
    }

    .select-box:focus {
      border-color: rgba(112, 186, 255, 0.45);
      box-shadow: 0 0 0 4px rgba(77, 145, 255, 0.12);
    }

    /* ACTION BUTTONS */
    .action-buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .action-btn {
      flex: 1;
      min-width: 220px;
      padding: 15px 18px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #13345c, #1b5eb0);
      color: white;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      transition: 0.25s ease;
      box-shadow: 0 10px 20px rgba(12, 36, 75, 0.28);
    }

    .action-btn:hover {
      transform: translateY(-3px);
      background: linear-gradient(135deg, #18477f, #2874d3);
      box-shadow: 0 14px 22px rgba(37, 102, 210, 0.18);
    }

    /* TABLE */
    .table-box {
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(106, 177, 255, 0.15);
      background: rgba(7, 15, 28, 0.72);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: linear-gradient(90deg, #123159, #1d63b7);
    }

    th {
      padding: 16px 12px;
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      letter-spacing: 0.3px;
    }

    td {
      padding: 15px 12px;
      text-align: center;
      color: #d9edff;
      border-top: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.01);
      transition: 0.2s;
    }

    tbody tr:hover td {
      background: rgba(81, 160, 255, 0.08);
    }

    /* FOOT NOTE */
    .footer-note {
      margin-top: 16px;
      font-size: 12px;
      color: #9dbad9;
      text-align: right;
    }

    /* RESPONSIVE */
 @media (max-width: 980px) {
  .menu-toggle {
    display: block;
  }

  .top-badge {
    display: none;
  }

  .container {
    display: block;
  }

  .sidebar {
    position: fixed;
    top: 0;
    left: -100%;
    width: 270px;
    height: 100%;
    z-index: 999;
    transition: left 0.3s ease;
    border-right: 1px solid rgba(91, 169, 255, 0.12);
    border-bottom: none;
  }

  .sidebar.active {
    left: 0;
  }

  .main-content {
    padding: 18px;
  }

  .header {
    padding: 10px 16px;
  }

  .brand-text h1 {
    font-size: 22px;
  }

  .logo-icon {
    width: 60px;
    height: 60px;
  }
}

</head>

  function toggleMenu() {
    document.querySelector(".sidebar").classList.toggle("active");
  }

  function activerBouton(boutonClique) {
    const boutons = document.querySelectorAll(".menu-btn");

    boutons.forEach(bouton => {
      bouton.classList.remove("active");
    });

    boutonClique.classList.add("active");
  }

  function mettreAJourTacheSelectionnee() {

  function changerTableau(headers, rows) {
    let headHtml = "<tr>";
    headers.forEach(header => {
      headHtml += `<th>${header}</th>`;
    });
    headHtml += "</tr>";
    document.getElementById("tableHead").innerHTML = headHtml;

    let bodyHtml = "";
    rows.forEach(row => {
      bodyHtml += "<tr>";
      row.forEach(cell => {
        bodyHtml += `<td>${cell}</td>`;
      });
      bodyHtml += "</tr>";
    });
    document.getElementById("tableBody").innerHTML = bodyHtml;
  }

    donneesTaches[tache].materiels
